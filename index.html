<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>График отпусков 2026</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="toolbar">
      <div class="title">График отпусков 2026</div>
      <input id="searchInput" type="text" placeholder="Поиск по сотруднику">
      <select id="groupFilter"><option value="all">Все отделы</option></select>
      <button id="addBtn" type="button">Добавить отпуск</button>
      <button id="resetBtn" type="button" class="danger-btn">Сбросить все</button>
      <button id="addEmployeeToolbarBtn" type="button">Добавить сотрудника</button>
      <button id="removeEmployeeToolbarBtn" type="button" class="danger-btn">Удалить сотрудника</button>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board">
        <div class="left-panel"><div class="left-top"></div></div>
        <div class="timeline-header"><div class="months" id="months"></div></div>
        <div class="groups-area">
          <div class="names-col" id="namesCol"></div>
          <div class="timeline-col" id="timelineCol">
            <div class="timeline-grid" id="timelineGrid"></div>
            <div id="timelineGroups"></div>
          </div>
        </div>
        <div class="status" id="statusBox"></div>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header" id="modalTitle">Добавить отпуск</div>
      <div class="modal-body">
        <input type="hidden" id="vacationId">
        <div class="field">
          <label for="employeeSelect">Сотрудник</label>
          <select id="employeeSelect"></select>
        </div>
        <div class="field">
          <label for="startDate">Дата начала</label>
          <input id="startDate" type="date">
        </div>
        <div class="field">
          <label for="endDate">Дата окончания</label>
          <input id="endDate" type="date">
        </div>
        <div class="field">
          <label for="vacationColor">Цвет полоски</label>
          <input id="vacationColor" type="color" value="#2d63dd">
        </div>
        <div class="field">
          <label for="comment">Комментарий</label>
          <input id="comment" type="text" placeholder="Основной отпуск / перенос / часть отпуска">
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeModalBtn" type="button">Отмена</button>
        <div class="actions-right">
          <button id="deleteBtn" type="button" class="danger">Удалить</button>
          <button id="saveBtn" type="button">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="employeeModalBackdrop">
    <div class="modal">
      <div class="modal-header">Добавить сотрудника</div>
      <div class="modal-body">
        <div class="field">
          <label for="employeeGroupSelect">Отдел</label>
          <select id="employeeGroupSelect"></select>
        </div>
        <div class="field">
          <label for="newEmployeeName">ФИО сотрудника</label>
          <input id="newEmployeeName" type="text" placeholder="Например: Иванова Мария Сергеевна">
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeEmployeeModalBtn" type="button">Отмена</button>
        <div class="actions-right">
          <button id="saveEmployeeBtn" type="button">Добавить</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="removeEmployeeModalBackdrop">
    <div class="modal">
      <div class="modal-header">Удалить сотрудника</div>
      <div class="modal-body">
        <div class="field">
          <label for="removeEmployeeGroupSelect">Отдел</label>
          <select id="removeEmployeeGroupSelect"></select>
        </div>
        <div class="field">
          <label for="removeEmployeeSelect">Сотрудник</label>
          <select id="removeEmployeeSelect"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeRemoveEmployeeModalBtn" type="button">Отмена</button>
        <div class="actions-right">
          <button id="confirmRemoveEmployeeBtn" type="button" class="danger">Удалить</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
